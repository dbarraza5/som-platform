name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        working-directory: backend
        run: npm ci

      - name: Compilar TypeScript
        working-directory: backend
        run: npm run build

      - name: Generar deploy.zip
        working-directory: backend
        run: npm run deploy:zip

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Subir zip a S3
        working-directory: backend
        run: |
          VERSION_LABEL="backend-$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::8}"
          echo "VERSION_LABEL=$VERSION_LABEL" >> $GITHUB_ENV

          aws s3 cp deploy.zip \
            s3://${{ secrets.S3_EB_BUCKET }}/backend/$VERSION_LABEL.zip

      - name: Crear versión en Beanstalk
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${{ secrets.EB_APP_NAME }} \
            --version-label $VERSION_LABEL \
            --source-bundle S3Bucket="${{ secrets.S3_EB_BUCKET }}",S3Key="backend/$VERSION_LABEL.zip"

      - name: Desplegar en Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --application-name ${{ secrets.EB_APP_NAME }} \
            --environment-name ${{ secrets.EB_ENV_NAME }} \
            --version-label $VERSION_LABEL

      - name: Esperar deploy completado
        run: |
          aws elasticbeanstalk wait environment-updated \
            --application-name ${{ secrets.EB_APP_NAME }} \
            --environment-name ${{ secrets.EB_ENV_NAME }}
        timeout-minutes: 10
